<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f2f4f6;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:480px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            text-align:center;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#1976d2;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Forgot Password</h2>

        <p>
            We received a request to reset your password.
            Click the button below to create a new password.
        </p>

        <a href="https://yourdomain.com/reset-password" class="btn">
            Reset Password
        </a>

        <p style="margin-top:20px; font-size:12px; color:#777;">
            If you did not request this, please ignore this email.
        </p>

    </div>

</body>

</html>
